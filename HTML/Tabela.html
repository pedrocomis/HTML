<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="color: rgb(86, 54, 54);background-color: black;"><!--Style que estilizar a pagina , color , é cor da letra -->
    <h1 style="font-size:larger;">Tabela</h1><!--Style font-size é o tamanho da letra-->
    <p style="text-align: justify ;">Forma de organizar as informações, dados em uma estrutura de colunas e linhas.</p><!--Style-text-align alinhamento do texto-->
    <Table style="width: 100% ;border-collapse: collapse;color: rgb(255, 255, 255);"><!--Tabela-->
        <tr><!--Linha Da Tabela-->
         <th style="border: 1px solid rgb(255, 255, 255);">Produto</th><!--Título da Tabela th-->
         <th style="border: 1px solid rgb(255, 255, 255);">Descrição</th>
         <th style="border: 1px solid rgb(255, 255, 255);">Preço</th>
       <tr>
       <tr>
         <td style="border: 1px solid rgb(255, 255, 255);">Luva</td><!--Descritivo sem negrito td-->
         <td style="border: 1px solid rgb(255, 255, 255);">Latex</td>
         <td style="border: 1px solid rgb(255, 255, 255);">R$10.00</td>
       </tr>
       <tr>
         <td style="border: 1px solid rgb(255, 255, 255);">Farinha</td><!--Descritivo sem negrito td-->
         <td style="border: 1px solid rgb(255, 255, 255);">Fardo</td>
         <td style="border: 1px solid rgb(255, 255, 255);">R$100.00</td>
       </tr>
    </Table>
</body>
</html>
