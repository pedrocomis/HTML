<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        table{
            width: 100%;
            border-collapse: collapse;
        }
        td,th{
            border: 1px solid #000;

        } 
        h1{
            color: blue;
        }
    </style>
</head>
<body>
     <h1>CSS Interno</h1>
      <Table>
         <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Cidade</th>

         </tr>
      </Table>

</body>
</html>
